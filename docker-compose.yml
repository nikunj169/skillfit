services:
  db:
    image: pgvector/pgvector:pg16
    container_name: skillfit-db
    environment:
      POSTGRES_DB: skillfit
      POSTGRES_USER: skillfit
      POSTGRES_PASSWORD: skillfit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: skillfit-backend
    environment:
      SKILLFIT_DATABASE_URL: postgresql://skillfit:skillfit@db:5432/skillfit
      SKILLFIT_ADMIN_TOKEN: skillfit-admin
      SKILLFIT_ALLOWED_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","http://localhost"]'
    volumes:
      - ./backend:/app/backend
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    container_name: skillfit-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27-alpine
    container_name: skillfit-nginx
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
