apiVersion: v1
kind: Service
metadata:
  name: skillfit-backend
spec:
  selector:
    app: skillfit-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: skillfit-frontend
spec:
  selector:
    app: skillfit-frontend
  ports:
    - name: http
      port: 5173
      targetPort: 5173
